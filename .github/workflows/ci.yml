name: Run MSTest Tests
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
      - name: Run tests
        run: dotnet test MyProject.Tests/ --logger trx --results-directory ./TestResults || true
      - name: Show test output files
        run: find . -name "*.trx" -o -name "*.xml" | grep -v ".git" || echo "no result files found"
      - uses: actions/upload-artifact@v4
        with:
          name: mstest-results
          path: TestResults/
          if-no-files-found: warn
